name: Release Windows binaries

# Called by release.yml when a GitHub Release is published. DuckDB ships no MSVC static
# Windows lib (only a MinGW one, not MSVC-linkable), so a static self-contained
# DLL is impossible. Instead we build php_pdo_duckdb.dll against DuckDB's
# dynamic import lib (duckdb.lib) and SHIP duckdb.dll inside the asset zip. PIE
# installs bundled dependency DLLs to the PHP root (next to php.exe, on the
# loader path) and the extension DLL to ext\, so the dependency resolves at
# load. Each exact release archive is loaded and queried before it is staged.
#
# x64 only: DuckDB ships no 32-bit Windows lib. NTS + TS. PHP 8.4/8.5 are the
# runtime-validated set; older PHP falls back to PIE's composer-default source
# build.

on:
  workflow_call:

permissions: {}

env:
  # Keep in sync with DUCKDB_VERSION in tests.yml.
  DUCKDB_VERSION: "1.5.4"

jobs:
  build:
    name: ${{ matrix.php }} ${{ matrix.ts }} x64
    runs-on: windows-2022
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        ts: ['nts', 'ts']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download libduckdb (amd64 dynamic — duckdb.h, duckdb.lib, duckdb.dll)
        shell: pwsh
        run: |
          $url = "https://github.com/duckdb/duckdb/releases/download/v$env:DUCKDB_VERSION/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          $entry = Get-Content .github\duckdb-sha256.txt | Where-Object { $_ -match '  libduckdb-windows-amd64\.zip$' }
          if (-not $entry) { throw 'missing checksum for libduckdb-windows-amd64.zip' }
          $expected = ($entry -split '\s+')[0]
          $actual = (Get-FileHash duckdb.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "DuckDB checksum mismatch: expected $expected, got $actual" }
          Expand-Archive duckdb.zip -DestinationPath duckdb-deps -Force

      - name: Build extension DLL (MSVC, against dynamic libduckdb)
        uses: php/php-windows-builder/extension@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8 # v1
        with:
          php-version: ${{ matrix.php }}
          arch: x64
          ts: ${{ matrix.ts }}
          args: --with-pdo-duckdb=${{ github.workspace }}\duckdb-deps
          run-tests: false

      - name: Setup matching PHP for final-archive validation
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
        env:
          phpts: ${{ matrix.ts }}

      - name: Bundle duckdb.dll and finalize the release archive
        id: package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^[A-Za-z0-9][A-Za-z0-9._+-]*$') {
            throw 'unsupported release tag for an archive name'
          }

          $zip = Get-ChildItem artifacts -Filter "php_pdo_duckdb-*.zip" |
                 Where-Object { $_.Name -notlike '*-logs*' } | Select-Object -First 1
          if (-not $zip) { throw "no extension artifact zip produced" }
          # Reuse the php-ts-vs-arch suffix the builder picked (the vs version
          # tracks the PHP version); only swap the ref segment for the tag.
          if ($zip.BaseName -notmatch '(\d+\.\d+-(?:nts|ts)-vs\d+-\w+)$') {
            throw "unexpected artifact name: $($zip.Name)"
          }
          $newbase = "php_pdo_duckdb-$tag-$($matches[1])"

          Expand-Archive $zip.FullName -DestinationPath stage -Force
          Get-ChildItem stage -Filter "php_pdo_duckdb-*.dll" | ForEach-Object { Rename-Item $_.FullName "$newbase.dll" }
          Get-ChildItem stage -Filter "php_pdo_duckdb-*.pdb" | ForEach-Object { Rename-Item $_.FullName "$newbase.pdb" }
          # Ship duckdb.dll alongside; PIE drops it next to php.exe on install.
          Copy-Item duckdb-deps\duckdb.dll -Destination stage\ -Force

          $out = "$newbase.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path stage\* -DestinationPath $out
          Get-FileHash $out -Algorithm SHA256 | Format-List
          "package=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate the exact release archive
        shell: pwsh
        env:
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          $ErrorActionPreference = 'Stop'
          $package = $env:PACKAGE
          Expand-Archive $package -DestinationPath release-verify -Force
          $extdll = Get-ChildItem release-verify -Filter 'php_pdo_duckdb-*.dll' | Select-Object -First 1
          $duckdbdll = Get-ChildItem release-verify -Filter 'duckdb.dll' | Select-Object -First 1
          if (-not $extdll) { throw 'final archive contains no extension DLL' }
          if (-not $duckdbdll) { throw 'final archive contains no duckdb.dll' }

          $php = (Get-Command php).Source
          Copy-Item $duckdbdll.FullName -Destination (Split-Path $php) -Force
          php -d extension="$($extdll.FullName)" scripts\win-probe.php
          if ($LASTEXITCODE -ne 0) { throw "final archive probe failed (exit $LASTEXITCODE)" }
          Get-FileHash $package -Algorithm SHA256 | Format-List

      - name: Stage validated release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows-php${{ matrix.php }}-${{ matrix.ts }}
          path: ${{ steps.package.outputs.package }}
          if-no-files-found: error
