name: Binary build validation

# Dispatch-only dry run: proves the self-contained static build works on each
# release target (Linux amd64/arm64, macOS arm64) on real runners, WITHOUT
# publishing. The release publisher (release-linux.yml) reuses the same
# download + static-link steps via php/pie-ext-binary-builder, so a green run
# here is the pre-tag gate for those lanes.

on:
  workflow_dispatch:

env:
  DUCKDB_VERSION: "1.5.4"

jobs:
  validate:
    name: ${{ matrix.os }} php ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     duckdb: static-libs-linux-amd64.zip, php: '8.4' }
          - { os: ubuntu-24.04,     duckdb: static-libs-linux-amd64.zip, php: '8.5' }
          - { os: ubuntu-24.04-arm, duckdb: static-libs-linux-arm64.zip, php: '8.4' }
          - { os: ubuntu-24.04-arm, duckdb: static-libs-linux-arm64.zip, php: '8.5' }
          - { os: macos-14,         duckdb: static-libs-osx-arm64.zip,   php: '8.4' }
          - { os: macos-14,         duckdb: static-libs-osx-arm64.zip,   php: '8.5' }
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Download DuckDB static libs
        shell: bash
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/${{ matrix.duckdb }}" -o duckdb-static.zip
          mkdir -p duckdb-static
          unzip -o -q duckdb-static.zip -d duckdb-static
          ls -la duckdb-static | head

      - name: Build (static, self-contained)
        shell: bash
        run: |
          phpize
          ./configure --with-pdo-duckdb-static="$GITHUB_WORKSPACE/duckdb-static" --enable-pdo-duckdb-dev
          if [ "$RUNNER_OS" = "macOS" ]; then
            # libtool hardcodes the deprecated `-flat_namespace -undefined
            # suppress` combo for bundles. Flat namespace lets DuckDB's
            # statically-linked ICU bind malloc/free across library boundaries,
            # so memory it allocates is freed through the wrong zone ->
            # find_zone_and_free abort at duckdb_open. Force two-level namespace
            # + dynamic_lookup so each symbol binds to its own library.
            sed -i.bak -e 's/-flat_namespace/-twolevel_namespace/g' -e 's/-undefined\([^A-Za-z]*\)suppress/-undefined\1dynamic_lookup/g' libtool
          fi
          make -j"$(getconf _NPROCESSORS_ONLN)"
          ls -lh modules/pdo_duckdb.so
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "=== namespace flag in final link ==="
            otool -hv modules/pdo_duckdb.so | grep -iE "TWOLEVEL|FLAT" || true
          fi

      - name: Verify self-contained (no libduckdb dependency)
        shell: bash
        run: |
          # Match libduckdb specifically — the module's own path contains
          # "pdo_duckdb", so a bare "duckdb" grep false-matches on macOS otool -L.
          if [ "$RUNNER_OS" = "macOS" ]; then
            otool -L modules/pdo_duckdb.so || true
            dep=$(otool -L modules/pdo_duckdb.so | tail -n +2 | grep -i libduckdb || true)
          else
            ldd modules/pdo_duckdb.so || true
            dep=$(ldd modules/pdo_duckdb.so | grep -i libduckdb || true)
          fi
          if [ -n "$dep" ]; then echo "ERROR: links libduckdb: $dep"; exit 1; fi
          echo "ok: no libduckdb dependency"

      - name: Undefined symbols (macOS diagnostic)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          echo "=== undefined symbols NOT provided by PHP/system (these abort when called under -undefined suppress) ==="
          nm -u modules/pdo_duckdb.so | sort -u \
            | grep -viE "_php_|_zend|_zif_|_executor_globals|_compiler_globals|_sapi_|_core_globals|dyld_stub|__error|_pcre2|_gc_|_tsrm_|_virtual_|_object_|_zval_|_smart_str" \
            | head -80
          echo "=== je_ / jemalloc undefined? ==="
          nm -u modules/pdo_duckdb.so | grep -iE "je_|jemalloc|malloc_zone" | head || echo "(none)"

      - name: Backtrace the abort (macOS diagnostic)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          cat > /tmp/probe.php <<'PHP'
          <?php
          fwrite(STDERR, "loaded=".(int)extension_loaded("pdo_duckdb")."\n");
          $d = new PDO("duckdb::memory:");
          fwrite(STDERR, "connected\n");
          PHP
          # First breakpoint to fire discriminates the abort cause:
          #   __cxa_throw first  -> a C++ exception is raised then unwinding/catch
          #                         fails -> terminate (EH/runtime mismatch).
          #   abort/__assert/pure-virtual first, no prior throw -> a direct abort
          #                         (assertion, pure-virtual, allocator) in duckdb_open.
          # DuckDB's static text is stripped, but the system-lib frames around the
          # abort (libc++abi / libsystem) symbolicate and reveal which path it is.
          lldb --batch \
            -o "breakpoint set -n abort" \
            -o "breakpoint set -n __cxa_throw" \
            -o "breakpoint set -n __cxa_pure_virtual" \
            -o "breakpoint set -n __assert_rtn" \
            -o "breakpoint set -n __cxa_rethrow" \
            -o "run" \
            -o "bt" \
            -o "quit" \
            -- php -d extension="$GITHUB_WORKSPACE/modules/pdo_duckdb.so" /tmp/probe.php 2>&1 \
            | grep -iE "stop reason|frame #|Process [0-9]+ stopped|abort|throw|assert|pure|libc\+\+|libsystem|exception|stopped at breakpoint" | head -50

      - name: Load + query (no libduckdb on path)
        shell: bash
        run: |
          php -d extension="$GITHUB_WORKSPACE/modules/pdo_duckdb.so" -r '
            fwrite(STDERR, "STAGE loaded=".(int)extension_loaded("pdo_duckdb")."\n");
            $d = new PDO("duckdb::memory:");
            fwrite(STDERR, "STAGE connected\n");
            $d->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
            $v = $d->getAttribute(PDO::ATTR_CLIENT_VERSION);
            fwrite(STDERR, "STAGE version=$v\n");
            $d->exec("CREATE TABLE t(i INTEGER, s VARCHAR)");
            fwrite(STDERR, "STAGE created\n");
            $d->exec("INSERT INTO t VALUES (1, \x27a\x27), (2, \x27b\x27)");
            fwrite(STDERR, "STAGE inserted\n");
            $n = (int) $d->query("SELECT count(*) FROM t")->fetchColumn();
            fwrite(STDERR, "STAGE queried n=$n\n");
            if ($n !== 2) { fwrite(STDERR, "bad count: $n\n"); exit(1); }
            echo "ok: self-contained query works, duckdb $v\n";
          '
