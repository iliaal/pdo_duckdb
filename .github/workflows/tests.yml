name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with .upstream/duckdb.yml.
  DUCKDB_VERSION: '1.5.4'

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none
      - name: Install PIE build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bison libtool-bin unzip
      - name: Install libduckdb to /usr/local
        run: |
          curl -fsSL -o /tmp/libduckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip"
          mkdir -p /tmp/duckdb && unzip -o /tmp/libduckdb.zip -d /tmp/duckdb
          sudo install -m644 /tmp/duckdb/duckdb.h /usr/local/include/
          sudo install -m755 /tmp/duckdb/libduckdb.so /usr/local/lib/
          sudo ldconfig
      - name: Download PIE
        run: |
          curl -fsSL -o /tmp/pie.phar https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /tmp/pie.phar
      - name: PIE build smoke
        run: |
          php /tmp/pie.phar repository:add path .
          php /tmp/pie.phar build iliaal/pdo_duckdb:*@dev

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Cache libduckdb
        id: cache-duckdb
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: duckdb
          key: libduckdb-linux-amd64-${{ env.DUCKDB_VERSION }}-v1

      - name: Download libduckdb
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends unzip
          curl -fsSL -o /tmp/libduckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip"
          mkdir -p duckdb/include duckdb/lib raw && unzip -o /tmp/libduckdb.zip -d raw
          cp raw/duckdb.h duckdb/include/
          cp raw/libduckdb.so duckdb/lib/

      - name: Build extension
        run: |
          phpize
          ./configure --with-pdo-duckdb="$PWD/duckdb" --enable-pdo-duckdb-dev
          WARNINGS=$(make -j"$(nproc)" 2>&1 | tee /dev/stderr | grep -c 'warning:' || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Build produced $WARNINGS warning(s)"
            exit 1
          fi

      - name: Run tests
        run: |
          export LD_LIBRARY_PATH="$PWD/duckdb/lib"
          TEST_PHP_EXECUTABLE="$(command -v php)"
          export TEST_PHP_EXECUTABLE
          export TEST_PHP_ARGS="-d extension=$PWD/modules/pdo_duckdb.so"
          export NO_INTERACTION=1
          # Direct invocation: run-tests.php exits non-zero on failures and the
          # --show-diff output is printed inline (no capture-under-bash-e, which
          # would abort at the assignment and hide the diff).
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

      - name: PDO common tests
        # Only on 8.4/8.5: the suite runs clean there (the 2 DuckDB SQL-dialect
        # fails in the allowlist). On 8.1-8.3 the older ext/pdo/tests files have
        # poor isolation (generic table names, no --CLEAN--, unmarked XFAIL) that
        # adds test-artifact noise against a shared DSN — not driver bugs, so not
        # worth gating on. The PDO contract is version-stable; 8.4+8.5 cover it.
        if: matrix.php == '8.4' || matrix.php == '8.5'
        env:
          PHP_VERSION: ${{ matrix.php }}
        run: |
          # Run PHP's shared ext/pdo/tests against the driver (generic PDO
          # contract: fetch modes, bound params, transactions, error modes).
          # The suite isn't bundled; sparse-checkout it for this PHP version.
          git clone --depth=1 --branch="PHP-${PHP_VERSION}" --filter=blob:none --sparse \
            https://github.com/php/php-src.git /tmp/php-src-common
          git -C /tmp/php-src-common sparse-checkout set ext/pdo/tests
          PHP="$(which php)" \
          RUN_TESTS="$PWD/run-tests.php" \
          COMMON_DIR=/tmp/php-src-common/ext/pdo/tests \
          DUCKDB_PREFIX="$PWD/duckdb" \
          EXT="$PWD/modules/pdo_duckdb.so" \
          bash scripts/pdo-common-tests.sh

  duckdb-floor:
    name: DuckDB 1.5.3 floor - PHP 8.4
    runs-on: ubuntu-latest
    env:
      DUCKDB_FLOOR_VERSION: '1.5.3'
      DUCKDB_FLOOR_SHA256: '0a926eba5bce0abc0010f4b9109133e4440cb74e97bd10fd2d0fc2a721621b05'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none

      - name: Download DuckDB floor release
        run: |
          curl -fsSL -o /tmp/libduckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_FLOOR_VERSION}/libduckdb-linux-amd64.zip"
          echo "${DUCKDB_FLOOR_SHA256}  /tmp/libduckdb.zip" | sha256sum --check --strict
          mkdir -p duckdb/include duckdb/lib raw
          unzip -o /tmp/libduckdb.zip -d raw
          cp raw/duckdb.h duckdb/include/
          cp raw/libduckdb.so duckdb/lib/

      - name: Build against DuckDB floor
        run: |
          phpize
          ./configure --with-pdo-duckdb="$PWD/duckdb" --enable-pdo-duckdb-dev
          make -j"$(nproc)"

      - name: Run full suite against DuckDB floor
        run: |
          export LD_LIBRARY_PATH="$PWD/duckdb/lib"
          TEST_PHP_EXECUTABLE="$(command -v php)"
          export TEST_PHP_EXECUTABLE
          export TEST_PHP_ARGS="-d extension=$PWD/modules/pdo_duckdb.so"
          export NO_INTERACTION=1
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

  portable-integers:
    name: Portable integer renderers - PHP 8.4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none

      - name: Download libduckdb
        run: |
          asset=libduckdb-linux-amd64.zip
          curl -fsSL -o "$asset" \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/${asset}"
          grep "  $asset$" .github/duckdb-sha256.txt | sha256sum --check --strict
          mkdir -p duckdb/include duckdb/lib raw
          unzip -o "$asset" -d raw
          cp raw/duckdb.h duckdb/include/
          cp raw/libduckdb.so duckdb/lib/

      - name: Build without compiler int128 support
        run: |
          phpize
          CFLAGS="-U__SIZEOF_INT128__" \
            ./configure --with-pdo-duckdb="$PWD/duckdb" --enable-pdo-duckdb-dev
          make -j"$(nproc)"

      - name: Run full suite through portable integer renderers
        run: |
          export LD_LIBRARY_PATH="$PWD/duckdb/lib"
          TEST_PHP_EXECUTABLE="$(command -v php)"
          export TEST_PHP_EXECUTABLE
          export TEST_PHP_ARGS="-d extension=$PWD/modules/pdo_duckdb.so"
          export NO_INTERACTION=1
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0:detect_leaks=1
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan-suppressions.txt:print_suppressions=0
      PHP_VERSION: ${{ matrix.php }}
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y llvm clang re2c bison autoconf unzip

      - name: Put the clang ASan runtime on the loader path
        # -shared-libasan binaries (the configure C-compiler probe, the built
        # php, the extension) need libclang_rt.asan_*.so at runtime; it lives in
        # clang's resource dir, not a default loader path. Without this, php-src
        # configure fails with "cannot run C compiled programs".
        run: echo "LD_LIBRARY_PATH=$(clang -print-resource-dir)/lib/linux" >> "$GITHUB_ENV"

      - name: Cache libduckdb
        id: cache-duckdb
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: duckdb
          key: libduckdb-linux-amd64-${{ env.DUCKDB_VERSION }}-v1

      - name: Download libduckdb
        if: steps.cache-duckdb.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/libduckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/libduckdb-linux-amd64.zip"
          mkdir -p duckdb/include duckdb/lib raw && unzip -o /tmp/libduckdb.zip -d raw
          cp raw/duckdb.h duckdb/include/
          cp raw/libduckdb.so duckdb/lib/

      - name: Build PHP with ASAN and PDO (-shared-libasan keeps __cxa_throw resolvable across dlopen)
        run: |
          git clone --depth=1 --branch="PHP-${PHP_VERSION}" https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --enable-pdo \
            --prefix=/tmp/php-asan
          make -j"$(nproc)"
          make install

      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --with-pdo-duckdb="$PWD/duckdb" \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j"$(nproc)"

      - name: Run tests under ASAN
        run: |
          export LD_LIBRARY_PATH="$PWD/duckdb/lib:${LD_LIBRARY_PATH}"
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$PWD/modules/pdo_duckdb.so"
          export NO_INTERACTION=1
          set +e
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt
          test_status=${PIPESTATUS[0]}
          set -e
          if [ "$test_status" -ne 0 ]; then
            echo "::error::run-tests.php failed under ASAN (exit $test_status)"
            exit "$test_status"
          fi
          if grep -qP 'Expected leak\s*:\s*[1-9][0-9]*' /tmp/test-output.txt; then
            echo "::error::ASAN test run contains expected leaks (XLEAK)"
            exit 1
          fi
          if ! grep -qP 'Number of tests\s*:\s*[1-9][0-9]*' /tmp/test-output.txt; then
            echo "::error::ASAN test harness did not complete a non-empty test run"
            exit 1
          fi
