name: Binary build validation (Windows)

# Reusable release gate and manual dry run for the Windows prebuilt path. DuckDB
# ships no MSVC static lib (only a MinGW one, not MSVC-linkable), so a static
# self-contained DLL is impossible. Instead we build php_pdo_duckdb.dll against
# DuckDB's dynamic import lib (duckdb.lib) and ship duckdb.dll alongside. PIE
# installs bundled dependency DLLs to the PHP root (next to php.exe), which is
# on the loader path. The release workflow repeats this load-and-query gate on
# each exact archive it stages.

on:
  workflow_call:
  workflow_dispatch:

env:
  DUCKDB_VERSION: "1.5.4"

jobs:
  validate-windows:
    name: windows php ${{ matrix.php }} ${{ matrix.ts }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        ts: ['nts', 'ts']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download libduckdb (amd64 dynamic — duckdb.h, duckdb.lib, duckdb.dll)
        shell: pwsh
        run: |
          $url = "https://github.com/duckdb/duckdb/releases/download/v${{ env.DUCKDB_VERSION }}/libduckdb-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile duckdb.zip
          $entry = Get-Content .github\duckdb-sha256.txt | Where-Object { $_ -match '  libduckdb-windows-amd64\.zip$' }
          if (-not $entry) { throw 'missing checksum for libduckdb-windows-amd64.zip' }
          $expected = ($entry -split '\s+')[0]
          $actual = (Get-FileHash duckdb.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "DuckDB checksum mismatch: expected $expected, got $actual" }
          Expand-Archive duckdb.zip -DestinationPath duckdb-deps -Force
          Get-ChildItem duckdb-deps | Select-Object Name, Length

      - name: Build extension DLL (MSVC, against dynamic libduckdb)
        uses: php/php-windows-builder/extension@e03e5d39879adaeb61ed2225f0f4eae7db8c1df8 # v1
        with:
          php-version: ${{ matrix.php }}
          arch: x64
          ts: ${{ matrix.ts }}
          args: --with-pdo-duckdb=${{ github.workspace }}\duckdb-deps
          run-tests: false

      - name: Show build artifacts
        shell: pwsh
        run: Get-ChildItem -Recurse artifacts | Select-Object FullName, Length

      - name: Setup a stock PHP to load the built DLL
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
        env:
          phpts: ${{ matrix.ts }}

      - name: Bundle duckdb.dll beside php.exe and run a query
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Extract the built extension DLL out of the packaged artifact zip.
          $zip = Get-ChildItem -Recurse artifacts -Filter *.zip | Where-Object { $_.Name -notlike '*logs*' } | Select-Object -First 1
          Write-Host "artifact zip: $($zip.FullName)"
          Expand-Archive $zip.FullName -DestinationPath built -Force
          Get-ChildItem -Recurse built | Select-Object FullName, Length | Out-String | Write-Host
          $extdll = Get-ChildItem -Recurse built -Filter "php_pdo_duckdb*.dll" | Select-Object -First 1
          if (-not $extdll) { throw "no php_pdo_duckdb*.dll in artifact" }
          Write-Host "extension dll: $($extdll.FullName)"

          # Mirror what PIE does on install: dependency DLLs go to the PHP root,
          # next to php.exe (on the loader path); the extension DLL is loaded by
          # full path.
          $php = (Get-Command php).Source
          $phpdir = Split-Path $php
          Write-Host "php.exe: $php"
          Copy-Item duckdb-deps\duckdb.dll -Destination $phpdir -Force

          # Negative control: without duckdb.dll on the path the load must fail.
          # (Run before the copy would have been pointless — instead confirm the
          # extension reports loaded only after the dependency is resolvable.)
          php -d extension="$($extdll.FullName)" -r "echo 'loaded='.(int)extension_loaded('pdo_duckdb').PHP_EOL;"
          if ($LASTEXITCODE -ne 0) { throw "extension failed to load even with duckdb.dll present" }

          php -d extension="$($extdll.FullName)" scripts\win-probe.php
          if ($LASTEXITCODE -ne 0) { throw "win-probe.php failed (exit $LASTEXITCODE)" }
          Write-Host "RESULT: windows bundled-DLL path validated"
